      - { behaviour: "enqueue a run (queued count rises)",                     status: implemented, test: "pw/test_dashboard_consistency::test_enqueue_run_increments_runs_dashboard" }
      - { behaviour: "anonymous cannot enqueue a run",                         status: implemented, test: "top-level/test_ui_flow::test_anonymous_cannot_enqueue_run" }
      - { behaviour: "lease form submits and leases a job",                    status: todo, note: "KNOWN BUG: the lease form posts to bare '/<ns>/<repo>/runs/lease' (no '/-/'), which parse_action_path won't route; only form presence is asserted" }

  - page: Repo Settings
    routes: ["GET /<ns>/<repo>/-/settings"]
    behaviours:
      - { behaviour: "shows owner/default-branch/visibility; Settings active", status: implemented, test: "pw/test_project_pages::test_repo_settings_page" }

  - page: Namespace landing
    routes: ["GET /<ns>"]
    behaviours:
      - { behaviour: "lists the namespace's repositories",                     status: implemented, test: "pw/test_project_pages::test_namespace_landing_lists_repos" }
      - { behaviour: "anonymous -> /-/login",                                  status: implemented, test: "pw/test_negative_routes::test_anonymous_namespace_path_redirects_to_login" }

  - page: Groups list
    routes: ["GET /-/groups", "POST /-/groups/create", "POST /-/groups/go"]
    behaviours:
