      - { behaviour: "filing an issue raises the open count",                  status: implemented, test: "pw/test_project_pages::test_issue_count_increments_then_close_form_round_trips" }
      - { behaviour: "close action route is live (round-trips back)",          status: implemented, test: "pw/test_project_pages::test_issue_count_increments_then_close_form_round_trips" }
      - { behaviour: "anonymous cannot create an issue",                       status: implemented, test: "top-level/test_ui_flow::test_anonymous_cannot_create_issue" }
      - { behaviour: "close-by-id actually decrements the count",              status: todo, note: "webapp doesn't surface the new issue id, so the id to close is unknown to the test" }

