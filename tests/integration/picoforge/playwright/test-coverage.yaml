      - { behaviour: "non-admin mint refused (via UI POST)",                   status: partial, note: "gateway+webapp both gate it; not driven as a browser POST" }
      - { behaviour: "minted opaque PAT usable as Authorization: Bearer",      status: todo, note: "external-token flow; better as a gateway-level test" }

  - page: Admin services
    routes: ["GET /-/admin/services"]
    behaviours:
