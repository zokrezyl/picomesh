      - { behaviour: "reflects a freshly filed issue",                         status: implemented, test: "pw/test_dashboard_consistency::test_filed_issue_shows_on_issues_dashboard" }
      - { behaviour: "anonymous sees empty state, no repo leak",               status: implemented, test: "pw/test_negative_routes::test_anonymous_dashboard_issues_leaks_no_repos" }

