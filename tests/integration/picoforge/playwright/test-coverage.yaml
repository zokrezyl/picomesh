      - { behaviour: "create a subgroup (nested namespace appears)",           status: implemented, test: "pw/test_rbac_ui::test_create_subgroup_appears_in_admin_namespaces" }
      - { behaviour: "non-maintainer forbidden (403)",                         status: implemented, test: "pw/test_rbac_ui::test_non_maintainer_forbidden_from_group_detail" }
