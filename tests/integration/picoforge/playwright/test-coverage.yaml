      - { behaviour: "empty repo shows the empty-state prompt",                status: implemented, test: "pw/test_repo_files::test_empty_repo_shows_empty_state" }
      - { behaviour: "subdirectory descend + parent '..' link",                status: implemented, test: "pw/test_repo_files::test_create_file_in_subdirectory" }
      - { behaviour: "New-file button is dir-scoped (?dir=)",                  status: implemented, test: "pw/test_repo_files::test_create_file_in_subdirectory" }
      - { behaviour: "unreadable/private repo shows read error",               status: todo }

  - page: File editor (Monaco)
    routes: ["GET /<ns>/<repo>/-/new", "GET /<ns>/<repo>/-/edit?path=", "POST /<ns>/<repo>/-/edit"]
    behaviours:
      - { behaviour: "new file: blank, editable path field",                   status: implemented, test: "pw/test_repo_files::test_new_file_editor_is_blank_with_editable_path" }
      - { behaviour: "edit: readonly path + breadcrumb to tree",               status: implemented, test: "pw/test_repo_files::test_editor_path_is_readonly_when_editing" }
      - { behaviour: "commit a new file (content round-trips)",                status: implemented, test: "top-level/test_ui_flow::test_full_ui_flow" }
      - { behaviour: "edit persists via git_repo (round-trips)",               status: implemented, test: "top-level/test_ui_flow::test_full_ui_flow" }
      - { behaviour: "commit into a subdirectory",                             status: implemented, test: "pw/test_repo_files::test_create_file_in_subdirectory" }

