      - { behaviour: "missing static asset -> 404",                            status: implemented, test: "pw/test_more_coverage::test_static_missing_asset_404" }
      - { behaviour: "GET / redirects signed-in user to /-/repos",            status: implemented, test: "pw/test_more_coverage::test_root_redirects_to_repos" }

  - page: Routing negatives
    routes: ["GET /-/<unknown>", "GET /<ns>/<repo>/-/<unknown-verb>"]
    behaviours:
      - { behaviour: "unknown /-/ command -> 404",                            status: implemented, test: "pw/test_negative_routes::test_unknown_command_404" }
      - { behaviour: "unknown repo verb -> 404",                              status: implemented, test: "pw/test_negative_routes::test_unknown_repo_verb_404" }

  # The gateway is API-only (no HTML). Listed for completeness — the webapp
  # sources everything from here; these guard the boundary itself.
  - page: Gateway API boundary
    routes: ["POST /_rpc", "GET /_describe", "GET|POST /_whoami"]
    behaviours:
      - { behaviour: "gateway serves NO HTML pages (404s GET HTML)",          status: implemented, test: "top-level/test_ui_flow::test_gateway_serves_no_html" }
      - { behaviour: "/_whoami anonymous = uid 0, never leaks a JWT",          status: implemented, test: "top-level/test_ui_flow::test_gateway_whoami_anonymous" }
      - { behaviour: "/_describe reflects every core service",                 status: implemented, test: "top-level/test_mesh_correctness::test_gateway_describe_lists_core_services" }
      - { behaviour: "every advertised read method reachable over /_rpc",     status: implemented, test: "top-level/test_mesh_correctness::test_gateway_rpc_surface_reachable" }
      - { behaviour: "distributed trace reconstructs across services",        status: implemented, test: "top-level/test_mesh_correctness::test_distributed_trace_reconstructs" }

  # Cross-cutting security properties spanning multiple pages.
  - page: Security (cross-cutting)
    routes: ["(spans gateway + webapp)"]
    behaviours:
      - { behaviour: "picomesh-uname cookie is cosmetic, never authoritative", status: implemented, test: "top-level/test_ui_flow::test_repo_owner_from_session_not_cookie" }
      - { behaviour: "namespace RBAC enforced (reporter ro, developer rw, ...)",status: implemented, test: "top-level/test_rbac (RPC layer)" }
      - { behaviour: "JWT never crosses the mesh boundary (exhaustive scan)",  status: partial, note: "anon /_whoami checks no JWT; not an exhaustive response/log scan" }
