      - { behaviour: "users count tile reflects the roster",                   status: implemented, test: "top-level/test_mesh_correctness::test_admin_users_roster_count_tile" }
      - { behaviour: "count + list_all agree at the RPC layer",                status: implemented, test: "top-level/test_mesh_correctness::test_accounts_roster_rpc" }

  - page: Admin repositories
    routes: ["GET /-/admin/repos"]
    behaviours:
      - { behaviour: "mesh-wide repository count tile renders an integer",     status: implemented, test: "pw/test_admin_pages::test_admin_repos_count_tile" }

  - page: Admin tokens
    routes: ["GET /-/admin/tokens", "POST /-/admin/tokens/mint_pat"]
    behaviours:
