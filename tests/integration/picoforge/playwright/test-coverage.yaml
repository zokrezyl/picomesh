# picoforge webapp — test coverage map
#
# One section per webapp PAGE/surface; each lists the business-logic behaviours
# worth testing and whether a test exists today. This is a living checklist:
# when you add a behaviour to the webapp, add a row here; when you add a test,
# flip its status and point `test:` at it.
#
# status:
#   implemented  — a real test asserts this behaviour
#   partial      — touched, but a meaningful sub-case is still untested
#   todo         — no test yet
#
# test references:
#   pw = tests/integration/picoforge/playwright/
#   top-level = tests/integration/picoforge/   (test_ui_flow / test_mesh_correctness / test_rbac)

meta:
  driver: "Playwright + system Google Chrome, real browser, no JS injection"
  invariant: "every action round-trips browser -> picoforge-webapp -> gateway /_rpc -> backends"
  run: "PICOMESH_JWT_SECRET=<any-non-empty> ./run.sh playwright/"
  totals:
    implemented: 53          # passing playwright tests (+ the top-level suites)
    pages_fully_covered: 22
    open_gaps: 9

pages:

  - page: Login
    routes: ["GET /-/login", "POST /-/login"]
    behaviours:
      - { behaviour: "GET renders sign-in form (username/password fields)", status: implemented, test: "pw/test_auth_lifecycle::test_login_page_renders" }
      - { behaviour: "POST valid credentials -> session cookie -> /-/repos",  status: implemented, test: "pw/test_auth_lifecycle::test_register_then_logout_then_login_roundtrip" }
      - { behaviour: "POST wrong password -> error, no session",               status: implemented, test: "pw/test_auth_lifecycle::test_login_wrong_password_shows_error" }
      - { behaviour: "POST missing username/password -> error",                status: todo }

  - page: Register
    routes: ["GET /-/register", "POST /-/register"]
    behaviours:
      - { behaviour: "GET renders create-account form",                        status: implemented, test: "pw/test_auth_lifecycle::test_register_page_renders" }
      - { behaviour: "POST new account -> signed in -> /-/repos",              status: implemented, test: "top-level/test_ui_flow::test_full_ui_flow" }
      - { behaviour: "first registrant becomes site admin",                    status: implemented, test: "pw/test_admin_pages::test_admin_overview" }
      - { behaviour: "POST duplicate username -> error",                       status: implemented, test: "pw/test_auth_lifecycle::test_duplicate_registration_shows_error" }
      - { behaviour: "POST missing fields -> error",                           status: todo }

  - page: Logout
    routes: ["POST /-/logout"]
    behaviours:
      - { behaviour: "clears session, redirects to /-/login",                  status: implemented, test: "pw/test_auth_lifecycle::test_logout_clears_session" }
      - { behaviour: "post-logout a protected page bounces to login",          status: implemented, test: "pw/test_auth_lifecycle::test_logout_clears_session" }

  - page: GitHub OAuth
    routes: ["GET /-/auth/github", "GET /-/auth/github/callback"]
    behaviours:
      - { behaviour: "Sign-in-with-GitHub button shown when configured",       status: todo, note: "harness launches webapp without --github-client-id, so the button is gated off" }
      - { behaviour: "/-/auth/github redirects to GitHub authorize URL",       status: todo, note: "needs github_client_id in webapp config" }
      - { behaviour: "callback exchanges code -> session",                     status: todo, note: "needs a GitHub stub / fixture" }

  - page: App shell (topbar + sidebar)
    routes: ["(rendered on every signed-in page)"]
    behaviours:
      - { behaviour: "brand, global search, New + Admin actions present",      status: implemented, test: "pw/test_shell_nav::test_topbar_and_sidebar_present" }
      - { behaviour: "sidebar nav (Projects/Groups/Issues/Pipelines) present", status: implemented, test: "pw/test_shell_nav::test_topbar_and_sidebar_present" }
      - { behaviour: "sidebar links navigate",                                 status: implemented, test: "pw/test_shell_nav::test_sidebar_navigates_to_groups" }
      - { behaviour: "Admin link hidden from non-admins",                      status: implemented, test: "top-level/test_ui_flow::test_non_admin_forbidden_from_admin" }
      - { behaviour: "anonymous shell shows Sign in, no username",             status: implemented, test: "pw/test_negative_routes::test_anonymous_dashboard_issues_leaks_no_repos" }

  - page: Global search
    routes: ["GET /-/search?q="]
    behaviours:
      - { behaviour: "match lists repo linking to tree",                       status: implemented, test: "pw/test_shell_nav::test_global_search_finds_repo" }
      - { behaviour: "no match shows empty state",                             status: implemented, test: "pw/test_shell_nav::test_global_search_no_match" }
      - { behaviour: "topbar box submits to /-/search?q=",                     status: implemented, test: "pw/test_shell_nav::test_search_box_submits_to_search_page" }
      - { behaviour: "results scoped to caller's accessible repos (RBAC)",     status: implemented, test: "pw/test_rbac_ui::test_search_is_scoped_to_caller" }

  - page: Projects list
    routes: ["GET /-/repos"]
    behaviours:
      - { behaviour: "lists repos the caller can access",                      status: implemented, test: "top-level/test_ui_flow::test_full_ui_flow" }
      - { behaviour: "isolation: another user's repo not shown",               status: implemented, test: "pw/test_rbac_ui::test_repos_list_is_isolated_per_user" }
      - { behaviour: "anonymous -> /-/login",                                  status: implemented, test: "pw/test_negative_routes::test_anonymous_repos_redirects_to_login" }
      - { behaviour: "empty state for a brand-new user",                       status: todo }

  - page: New repository
    routes: ["GET /-/repos/new", "POST /-/repos/new"]
    behaviours:
      - { behaviour: "form shape (namespace default + datalist, name, button)",status: implemented, test: "pw/test_more_coverage::test_repos_new_form_shape" }
      - { behaviour: "create -> repo tree page",                              status: implemented, test: "top-level/test_ui_flow::test_full_ui_flow" }
