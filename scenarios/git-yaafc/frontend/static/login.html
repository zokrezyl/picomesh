<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · git-yaafc</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/app.js" defer></script>
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="/">git-yaafc</a>
    <ul class="nav-links">
      <li><a href="/repos.html">Repos</a></li>
      <li><a href="/issues.html">Issues</a></li>
      <li><a href="/runs.html">Pipelines</a></li>
      <li><a href="/admin.html">Admin</a></li>
    </ul>
    <div class="nav-right"><a href="/login.html" class="active">sign in</a></div>
  </nav>
  <main class="container">
    <div class="card narrow">
      <h1>Sign in</h1>
      <div id="error-box"></div>

      <form id="login-form">
        <label>User id (uint32)
          <input id="login-uid" type="number" autofocus required value="42">
          <small class="muted">accounts service maps real usernames to ids.</small>
        </label>
        <label>Password hash (int64)
          <input id="login-pw" type="number" required value="305441741">
          <small class="muted">password_authn compares the int hash bit-for-bit.</small>
        </label>
        <button type="submit" class="primary">Sign in</button>
        <a class="btn" href="/admin.html">Skip (admin view)</a>
      </form>

      <div class="oauth-divider">or sign in with</div>
      <div class="oauth-buttons">
        <a class="btn oauth-btn" href="#"
           onclick="alert('github_authn.set_credentials demo — see admin page'); return false;">
          GitHub
        </a>
      </div>

      <pre id="login-out"></pre>
    </div>
  </main>
  <footer><span>git-yaafc · password_authn + token_issuer + session</span></footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('login-form').onsubmit = async (ev) => {
        ev.preventDefault();
        const uid = parseInt(document.getElementById('login-uid').value, 10);
        const pw  = parseInt(document.getElementById('login-pw').value, 10);
        const errBox = document.getElementById('error-box');
        const out    = document.getElementById('login-out');

        // 1. Make sure the user is registered in accounts (idempotent).
        await invoke('accounts', 'accounts_store_register', [uid]);

        // 2. Register a password hash for the user (idempotent: 0 if
        //    already set — we just proceed).
        await invoke('password_authn', 'password_authn_store_register', [uid, pw]);

        // 3. Authenticate.
        const auth = R(await invoke('password_authn', 'password_authn_store_authenticate', [uid, pw]));
        if (auth !== 1) {
          errBox.innerHTML = '<div class="error">Authentication failed</div>';
          out.textContent = '';
          return;
        }

        // 4. Mint a JWT-ish token via the token_issuer.
        const tid = R(await invoke('token_issuer', 'token_issuer_store_login', [uid, /*provider=*/1]));

        // 5. Open a session bound to (uid, provider).
        const sid = R(await invoke('session', 'session_store_start', [uid, 1]));

        errBox.innerHTML = '';
        out.textContent =
          `signed in.\n` +
          `  user_id  = ${uid}\n` +
          `  token_id = ${tid}\n` +
          `  sid      = ${sid}\n\n` +
          `(go to /admin.html — your sid is stored in localStorage)`;
        localStorage.setItem('yaafc-sid', JSON.stringify({uid, tid, sid}));
      };
    });
  </script>
</body>
</html>
