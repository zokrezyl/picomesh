<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>issues · git-yaafc</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="/">git-yaafc</a>
    <ul class="nav-links">
      <li><a href="/accounts.html">Accounts</a></li>
      <li><a href="/storage.html">Storage</a></li>
      <li><a href="/issues.html" class="active">Issues</a></li>
      <li><a href="/tokens.html">Tokens</a></li>
      <li><a href="/mesh.html">Mesh</a></li>
    </ul>
  </nav>
  <main class="container">
    <h1>issues (port 8208)</h1>
    <div class="card">
      <h2>open issue</h2>
      <form id="open-form">
        <label>repo_id <input id="open-repo" type="number" value="1"></label>
        <label>author_id <input id="open-auth" type="number" value="42"></label>
        <button type="submit" class="primary">issues_store_open</button>
      </form>
      <pre id="open-out"></pre>
    </div>
    <div class="card">
      <h2>status of an issue</h2>
      <form id="st-form">
        <label>issue_id <input id="st-id" type="number" value="1"></label>
        <button type="submit">issues_store_status</button>
      </form>
      <pre id="st-out"></pre>
    </div>
    <div class="card">
      <h2>count_total</h2>
      <button id="count-btn">issues_store_count_total</button>
      <pre id="count-out"></pre>
    </div>
  </main>
  <footer><span>git-yaafc · issues_store</span></footer>
  <script>
    const BASE = `http://${location.hostname}:8208`;
    let handle = null;
    async function ensureHandle() {
      if (handle) return handle;
      const r = await fetch(BASE + '/create', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({class: 'issues_store'}),
      });
      handle = (await r.json()).handle;
      return handle;
    }
    async function invoke(method, args) {
      const h = await ensureHandle();
      const r = await fetch(BASE + '/invoke', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({method, handle: h, args}),
      });
      return r.json();
    }
    document.getElementById('open-form').onsubmit = async (e) => {
      e.preventDefault();
      const repo = parseInt(document.getElementById('open-repo').value, 10);
      const auth = parseInt(document.getElementById('open-auth').value, 10);
      const j = await invoke('issues_store_open', [repo, auth]);
      document.getElementById('open-out').textContent = JSON.stringify(j, null, 2);
    };
    document.getElementById('st-form').onsubmit = async (e) => {
      e.preventDefault();
      const id = parseInt(document.getElementById('st-id').value, 10);
      const j = await invoke('issues_store_status', [id]);
      const map = {1: 'open', 2: 'closed'};
      document.getElementById('st-out').textContent = JSON.stringify(j) +
        (j.result ? `  (${map[j.result] || 'unknown'})` : '');
    };
    document.getElementById('count-btn').onclick = async () => {
      const j = await invoke('issues_store_count_total', []);
      document.getElementById('count-out').textContent = JSON.stringify(j, null, 2);
    };
  </script>
</body>
</html>
