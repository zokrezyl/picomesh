# picomesh — windows/amd64 build (local backend on the Windows agent).
#
# Mirrors yetty's windows.yml shape (cmd shell, build, archive to a host
# artifact dir). picomesh already carries a Windows platform backend
# (src/picomesh/platform/time/windows.c) so the code intends to support it.
#
# Toolchain: NATIVE MSVC (cl.exe) + Ninja. The 3rdparty libs are all built
# with cl and link the dynamic Microsoft C runtime (msvcrt, /MD), so picomesh
# MUST be compiled by the same toolchain/ABI — building it with clang/mingw
# would produce an object ABI that cannot link the MSVC .lib archives. The
# agent must start this step from a "x64 Native Tools Command Prompt for VS"
# (or have vcvarsall x64 sourced) so cl.exe + the MSVC libs are on PATH.
#
# ── Known gap (this pipeline is the FRONTIER, not yet green) ───────────────
#   No prebuilt Windows 3rdparty tarballs are published — the
#   .github/workflows/build-3rdparty-*.yml matrices only cover
#   linux-{x86_64,aarch64,riscv64}. On Windows the CMake fetch therefore
#   takes its from-source fallback (build-tools/3rdparty/<lib>/_build.sh,
#   which builds each lib with cl). That fallback is bash + upstream CMake,
#   so a POSIX shell (git-bash/MSYS) must also be on PATH — until per-lib
#   windows-x86_64 tarballs are published.
#
# Intentionally scoped to `manual` + `tag` so it never blocks ordinary
# push/PR pipelines while the Windows prebuilt-tarball story is finished.

labels:
  platform: windows/amd64

when:
  - event: manual
  - event: tag

steps:
  build:
    image: cmd
    commands:
      # build.bat locates Visual Studio via vswhere, sources vcvarsall x64 so
      # cl.exe + the MSVC libs are on PATH (the agent's bare cmd shell has no
      # vcvars), then runs the Ninja + cl configure/build. cl is pinned so
      # cmake never auto-picks a clang/gcc — the .lib 3rdparty archives are
      # MSVC-ABI and the root CMakeLists forces the dynamic msvcrt (/MD) to
      # match them. A POSIX shell on PATH is still required for the 3rdparty
      # from-source fallback.
      - call build-tools\windows\build.bat
      - dir build-desktop-release\picomesh.exe build-desktop-release\picoforge-webapp.exe

  # Workspace lives under %TEMP%\woodpecker-local-NNN and is cleaned when the
  # pipeline ends; the local backend also sandboxes %USERPROFILE% into that
  # temp tree, so use the absolute agent-user home explicitly.
  archive:
    image: cmd
    when:
      status: [success]
    commands:
      - set "DEST=C:\Users\misi\woodpecker-artifacts\picomesh\windows\%CI_PIPELINE_NUMBER%"
      - mkdir "%DEST%" 2>nul
      - copy /Y build-desktop-release\picomesh.exe "%DEST%\"
      - copy /Y build-desktop-release\picoforge-webapp.exe "%DEST%\"
      # Flat-copy any DLLs the build stages (3rdparty runtime deps) next to
      # the executables so they run standalone from the artifact dir.
      - for /r build-desktop-release %%f in (*.dll) do @copy /Y "%%f" "%DEST%\" >nul
      - dir "%DEST%"
